name: CI Pipeline

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  calidad-codigo:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v3
      
    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Instalar Prettier
      run: npm install prettier
      
    - name: Verificar formato del código
      run: npx prettier --check .
      
    - name: Ejecutar tests
      run: npm test
      
    - name: Verificar estructura del proyecto
      run: |
        echo "=== Verificación de archivos ==="
        [ -f src/index.html ] && echo "✅ src/index.html" || echo "❌ Falta index.html"
        [ -f src/app.js ] && echo "✅ src/app.js" || echo "❌ Falta app.js"
        [ -f tests/suma.test.js ] && echo "✅ tests/suma.test.js" || echo "❌ Falta tests"
        echo "✅ Verificación completada"